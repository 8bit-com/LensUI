server.port=8080
spring.application.name=kubernetes-lens-ui

# Comma-separated namespaces to show. Leave blank to load all namespaces available to the current kube context.
kubernetes.namespaces=

# Optional kubeconfig path. Put your Lens/kubectl kubeconfig here, for example:
# kubernetes.kube-config-path=config/kubeconfig.yaml
# Leave blank to use the default kubeconfig: %USERPROFILE%\.kube\config
kubernetes.kube-config-path=

# Directory with Lens kubeconfig files. The UI will let you choose one of these files.
kubernetes.kube-config-dir=C:/Users/\u0412\u043b\u0430\u0434\u0438\u043c\u0438\u0440/OneDrive/\u0414\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u044b/config_lens

# Default log tail size used by the UI and API when tailLines is omitted.
kubernetes.logs.default-tail-lines=300
